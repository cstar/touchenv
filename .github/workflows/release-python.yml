name: Release Python SDK

on:
  push:
    tags: ["python-v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Install dev deps and test
        run: |
          pip install -e ".[dev]"
          pytest
        env:
          TOUCHENV_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

      - name: Build sdist and wheel
        run: python -m build

      - name: Create GitHub Release with packages
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sdks/python/dist/*.tar.gz
            sdks/python/dist/*.whl

      - name: Publish to PyPI
        if: env.HAS_PYPI_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/
