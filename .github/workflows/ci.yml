name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # 64-char hex DEK for CI (bypasses macOS Keychain)
  TOUCHENV_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

jobs:
  # ── Swift (macOS only — needs Keychain / Security.framework) ──
  swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cd swift && swift build
      - name: Test
        run: cd swift && swift test

  # ── CLI (TypeScript) ──
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: cd cli && npm ci
      - name: Build
        run: cd cli && npm run build
      - name: Test
        run: cd cli && npm test

  # ── SDK: Node ──
  sdk-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: cd sdks/node && npm install
      - name: Build
        run: cd sdks/node && npm run build
      - name: Test
        run: cd sdks/node && npm test
        continue-on-error: true  # no tests yet

  # ── SDK: Python ──
  sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: cd sdks/python && pip install -e ".[dev]"
      - name: Test
        run: cd sdks/python && pytest
        continue-on-error: true  # no tests yet

  # ── SDK: Go ──
  sdk-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: cd sdks/go && go build ./...
      - name: Test
        run: cd sdks/go && go test ./...
        continue-on-error: true  # no tests yet

  # ── Cross-language test vector gate ──
  vectors:
    runs-on: ubuntu-latest
    needs: [cli, sdk-node, sdk-python, sdk-go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install CLI deps
        run: cd cli && npm ci
      - name: Build CLI
        run: cd cli && npm run build
      - name: Verify test vectors
        run: |
          cd spec/test-vectors
          # Validate vectors are parseable JSON
          for f in *.json; do
            echo "Validating $f ..."
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
          done
          echo "All test vectors valid."
      - name: CLI passes vector suite
        run: cd cli && npm test
