name: Release Go SDK

on:
  push:
    tags: ["go/v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
        env:
          TOUCHENV_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

      - name: Verify module
        run: |
          TAG="${GITHUB_REF#refs/tags/go/}"
          echo "Tagged version: $TAG"
          go list -m github.com/cstar/touchenv-go@"$TAG" || echo "Module will be available on Go proxy after tag push"
